                                          beginAtZero: true,
                                    }
                              }
                        }
                  });
            }
            */

            // ==================== MY PAGE ====================

            async function loadPreferences() {
                  // Load from backend DB (source of truth)
                  try {
                        const res = await fetch(`${API}/api/preferences`);
                        const data = await res.json();
                        // Rebuild myLikes map
                        myLikes = {};
                        for (const like of (data.likes || [])) {
                              myLikes[like.value] = { platform: like.platform, url: like.url };
                        }
                        myKeywords = data.keywords || [];
                  } catch (e) {
                        // Silent fail — use empty state
                  }
                  updatePlatformTabs();
            }

            async function toggleLike(event, title, platform, url) {
                  const isLiked = !!myLikes[title];
                  if (isLiked) {
                        delete myLikes[title];
                        fetch(`${API}/api/preferences/unlike`, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ title })
                        }).catch(() => { });
                  } else {
                        myLikes[title] = { platform, url };
                        fetch(`${API}/api/preferences/like`, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ platform, title, url })
                        }).catch(() => { });
                  }
                  // Update button appearance in place
                  const btn = event.currentTarget;
                  btn.classList.toggle('liked', !isLiked);
                  btn.title = !isLiked ? '取消收藏' : '收藏';
                  const svg = btn.querySelector('svg');
                  if (svg) svg.setAttribute('fill', !isLiked ? 'currentColor' : 'none');
                  // Update tab count
                  updatePlatformTabs();
            }

            async function addKeyword() {
                  const input = document.getElementById('keywordInput');
                  const kw = (input.value || '').trim();
                  if (!kw) return;
                  input.value = '';
                  try {
                        const res = await fetch(`${API}/api/preferences/keyword`, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ keyword: kw })
                        });
                        const data = await res.json();
                        myKeywords = data.keywords || myKeywords;
                        renderMyPage();
                        showToast(`已添加关键词「${kw}」`, 'success');
                  } catch (e) {
                        showToast('添加失败: ' + e.message, 'error');
                  }
            }

            async function removeKeyword(id) {
                  myKeywords = myKeywords.filter(k => k.id !== id);
                  renderMyPage();
                  fetch(`${API}/api/preferences/keyword/${id}`, { method: 'DELETE' }).catch(() => { });
            }

            function renderKeywordTags() {
                  const container = document.getElementById('keywordTagsContainer');
                  if (!container) return;
                  if (myKeywords.length === 0) {
                        container.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">暂无关键词，添加后可获取相关新闻</span>';
                        return;
                  }
                  container.innerHTML = myKeywords.map(k => `
                        <span class="keyword-tag">
                              ${escapeHtml(k.value)}
                              <button class="keyword-tag-remove" onclick="removeKeyword(${k.id})" title="删除">×</button>
                        </span>`).join('');
            }

            /* Return all cached topics whose title matches any keyword or liked-topic word */
            const STOP_WORDS = new Set(['for', 'the', 'and', 'with', 'from', 'that', 'this', 'your', 'you', 'are', 'was', 'have', 'has', 'not', 'but', 'its', 'our', 'any', 'all', 'can', 'will', 'more', 'into', 'also', 'when', 'then', 'than', 'their', 'they', 'been', 'being', 'make', 'use', 'used', 'new', 'one', 'get', 'how', 'just', 'over', 'some', 'other', 'what', 'which']);

            function getRelatedTopics() {
                  // Build a list of match terms: user keywords + meaningful words from liked titles
                  const terms = new Set();
                  for (const kw of myKeywords) {
                        if (kw.value && kw.value.trim()) terms.add(kw.value.trim().toLowerCase());
                  }
                  for (const title of Object.keys(myLikes)) {
                        // CJK: 2+ chars; Latin: 4+ chars and not a stop word
                        const cjk = title.match(/[\u4e00-\u9fa5]{2,}/g) || [];
                        const latin = title.match(/[a-zA-Z]{4,}/g) || [];
                        for (const w of cjk) terms.add(w.toLowerCase());
                        for (const w of latin) {
                              const lw = w.toLowerCase();
                              if (!STOP_WORDS.has(lw)) terms.add(lw);
                        }
                  }
                  if (terms.size === 0) return [];

                  const seen = new Set();
                  const liked = new Set(Object.keys(myLikes)); // exclude already-liked
                  const results = [];

                  for (const [platform, topics] of Object.entries(allTopics)) {
                        for (const t of (topics || [])) {
                              if (liked.has(t.title)) continue;
                              if (seen.has(t.title)) continue;
                              const lower = t.title.toLowerCase();
                              let matchedTerm = null;
                              for (const term of terms) {
                                    if (lower.includes(term)) { matchedTerm = term; break; }
                              }
                              if (matchedTerm) {
                                    seen.add(t.title);
                                    results.push({ ...t, platform, matchedTerm });
                              }
                        }
                  }
                  return results.slice(0, 40);
            }

            function renderMyPage() {
                  const container = document.getElementById('topicListContainer');
                  const likeList = Object.entries(myLikes);
                  const related = getRelatedTopics();
                  document.getElementById('topicCount').textContent = `${likeList.length} saved · ${related.length} related`;

                  let html = '<div class="my-page">';

                  // Likes section
                  // Replace inline likes section with a compact button row
                  html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px">
                        <span style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono)">
                              ${likeList.length > 0 ? `❤️ ${likeList.length} 条收藏` : '❤️ 暂无收藏'}
                        </span>
                        <button class="btn" style="padding:4px 12px;font-size:11px;color:var(--neon-magenta);border-color:var(--neon-magenta);opacity:${likeList.length > 0 ? 1 : 0.4}"
                              onclick="showLikesModal()" ${likeList.length === 0 ? 'disabled' : ''}>
                              查看收藏
                        </button>
                  </div>`;

                  // Keywords section
                  html += `<div>
                        <div class="my-section-title">🔖 关键词订阅</div>
                        <div class="keyword-input-row">
                              <input class="keyword-input" id="keywordInput" type="text"
                                    placeholder="输入关键词（如：AI、比特币）" maxlength="50"
                                    onkeydown="if(event.key==='Enter')addKeyword()">
                              <button class="btn btn-primary" onclick="addKeyword()">添加</button>
                        </div>
                        <div class="keyword-tags" id="keywordTagsContainer"></div>
                  </div>`;

                  // Unified discover section: tabs for 热榜 vs 外部新闻
                  const hasTerms = myKeywords.length > 0 || Object.keys(myLikes).length > 0;
                  html += `<div>
                        <div class="discover-tabs">
                              <button class="discover-tab active" onclick="switchDiscoverTab('hot',this)">
                                    📡 热榜相关 <span class="dtab-count">${related.length}</span>
                              </button>
                              ${myKeywords.length > 0 ? `<button class="discover-tab" onclick="switchDiscoverTab('ext',this)">
                                    🌐 外部新闻 <span class="dtab-count" id="extNewsCount">…</span>
                              </button>` : ''}
                        </div>

                        <div class="discover-pane active" id="discoverPaneHot">`;

                  if (related.length === 0) {
                        html += `<div style="font-size:13px;color:var(--text-muted);padding:8px 0">
                              ${hasTerms ? '当前热榜中暂无匹配内容，刷新数据后再试' : '添加关键词或收藏话题后，系统将自动从热榜中筛选相关条目'}
                        </div>`;
                  } else {
                        html += '<div class="topic-list">';
                        for (const t of related) {
                              const platformName = PLATFORM_NAMES[t.platform] || t.platform || '';
                              const highlighted = escapeHtml(t.title).replace(
                                    new RegExp(escapeHtml(t.matchedTerm).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
                                    m => `<mark style="background:rgba(0,255,255,0.15);color:var(--neon-cyan);border-radius:2px">${m}</mark>`
                              );
                              html += `<a class="topic-item" ${t.url ? `href="${escapeAttr(t.url)}" target="_blank" rel="noopener noreferrer"` : ''}>
                                    <div class="topic-content">
                                          <div class="topic-title">${highlighted}</div>
                                          <div class="topic-meta">
                                                <span class="topic-category">${escapeHtml(platformName)}</span>
                                                <span class="topic-heat" style="color:var(--neon-cyan);opacity:0.7">${escapeHtml(t.matchedTerm)}</span>
                                          </div>
                                    </div>
                                    <div class="topic-actions">
                                          <button class="topic-action-btn like-btn"
                                                onclick="toggleLike(event,'${escapeAttr(t.title)}','${escapeAttr(t.platform)}','${escapeAttr(t.url || '')}')"
                                                title="收藏">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                          </button>
                                          <button class="topic-action-btn"
                                                onclick="event.preventDefault();event.stopPropagation();analyzeTopic('${escapeAttr(t.title)}')"
                                                title="AI 分析">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4c0 2 1 3 2 4l-5 7h14l-5-7c1-1 2-2 2-4a4 4 0 0 0-4-4z"/><path d="M12 18v4"/></svg>
                                          </button>
                                    </div>
                              </a>`;
                        }
                        html += '</div>';
                  }
                  html += `</div>`; // discoverPaneHot

                  if (myKeywords.length > 0) {
                        html += `<div class="discover-pane" id="discoverPaneExt">
                              <div id="externalFeedContainer">
                                    <div style="font-size:12px;color:var(--text-muted);padding:4px 0">🔄 加载中...</div>
                              </div>
                        </div>`;
                  }

                  html += `</div>`; // discover wrapper

                  html += '</div>';
                  container.innerHTML = html;

                  // Render keyword tags after HTML is injected
                  renderKeywordTags();

                  // Render AI/Articles panel
                  renderRecommendPanel(myRecommendData);
            }

            async function loadExternalFeedArticles() {
                  const container = document.getElementById('externalFeedContainer');
                  if (!container) return;
                  // Avoid duplicate fetches
                  if (container.dataset.loaded === '1') return;
                  container.dataset.loaded = '1';
                  try {
                        const kwStr = myKeywords.map(k => k.value).join(',');
                        const res = await fetch(`${API}/api/feed?keywords=${encodeURIComponent(kwStr)}`);
                        const data = await res.json();
                        const articles = data.articles || [];
                        const badge = document.getElementById('extNewsCount');
                        if (badge) badge.textContent = articles.length || '0';
                        if (articles.length === 0) {
                              container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0">暂无相关外部新闻</div>';
                              return;
                        }
                        let html = '<div class="articles-list">';
                        for (const a of articles) {
                              html += `<a class="article-item" href="${escapeAttr(a.url)}" target="_blank" rel="noopener noreferrer">
                                    <div class="article-title">${escapeHtml(a.title)}</div>
                                    <div class="article-meta">
                                          <span class="article-kw-badge">${escapeHtml(a.keyword)}</span>
                                          <span>${escapeHtml(a.source || '')}</span>
                                    </div>
                              </a>`;
                        }
                        html += '</div>';
                        container.innerHTML = html;
                  } catch (e) {
                        const container2 = document.getElementById('externalFeedContainer');
                        if (container2) container2.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">外部新闻加载失败</div>';
                  }
            }

            function switchDiscoverTab(tab, btn) {
                  // Update tab buttons
                  document.querySelectorAll('.discover-tab').forEach(b => b.classList.remove('active'));
                  if (btn) btn.classList.add('active');
                  // Update panes
                  const hotPane = document.getElementById('discoverPaneHot');
                  const extPane = document.getElementById('discoverPaneExt');
                  if (hotPane) hotPane.classList.toggle('active', tab === 'hot');
                  if (extPane) extPane.classList.toggle('active', tab === 'ext');
                  // Lazy-load external news on first visit
                  if (tab === 'ext') loadExternalFeedArticles();
            }

            function deleteLikeAndRefresh(title) {
                  delete myLikes[title];
                  fetch(`${API}/api/preferences/unlike`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title })
                  }).catch(() => { });
                  updatePlatformTabs();
                  renderMyPage();
                  // If the likes modal is open, refresh it live
                  if (document.getElementById('modalOverlay').classList.contains('active') &&
                        document.getElementById('modalTitle').textContent.startsWith('❤️')) {
                        showLikesModal();
                  }
            }

            function showLikesModal() {
                  const likeList = Object.entries(myLikes);
                  let html = '';
                  if (likeList.length === 0) {
                        html = '<p style="color:var(--text-muted);font-size:13px">暂无收藏，在话题列表中点击 ❤️ 即可收藏。</p>';
                  } else {
                        html = '<div class="topic-list">';
                        likeList.forEach(([title, info]) => {
                              const platformName = PLATFORM_NAMES[info.platform] || info.platform || '';
                              html += `<a class="topic-item" ${info.url ? `href="${escapeAttr(info.url)}" target="_blank" rel="noopener noreferrer"` : ''}>
                                    <div class="topic-content">
                                          <div class="topic-title">${escapeHtml(title)}</div>
                                          <div class="topic-meta"><span class="topic-category">${escapeHtml(platformName)}</span></div>
                                    </div>
                                    <div class="topic-actions" style="opacity:1">
                                          <button class="topic-action-btn like-btn liked"
                                                onclick="event.preventDefault();event.stopPropagation();deleteLikeAndRefresh('${escapeAttr(title)}')"
                                                title="取消收藏">
                                                <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                          </button>
                                          <button class="topic-action-btn"
                                                onclick="event.preventDefault();event.stopPropagation();analyzeTopic('${escapeAttr(title)}')"
                                                title="AI 分析">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4c0 2 1 3 2 4l-5 7h14l-5-7c1-1 2-2 2-4a4 4 0 0 0-4-4z"/><path d="M12 18v4"/></svg>
                                          </button>
                                    </div>
                              </a>`;
                        });
                        html += '</div>';
                  }
                  openModal(`❤️ 已收藏话题（${likeList.length}）`, html);
            }

            async function fetchRecommendations() {
                  const aiContainer = document.getElementById('aiPanelContainer');
                  aiContainer.innerHTML = '<div class="loading-skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';

                  try {
                        const res = await fetch(`${API}/api/recommend`, { method: 'POST' });
                        if (!res.ok) throw new Error('推荐请求失败');
                        const data = await res.json();
                        myRecommendData = data;
                        renderRecommendPanel(data);
                        showToast('个性化推荐已生成', 'success');
                  } catch (e) {
                        aiContainer.innerHTML = `<div class="ai-placeholder"><p style="color:var(--neon-red)">${escapeHtml(e.message)}</p></div>`;
                        showToast('推荐失败: ' + e.message, 'error');
                  }
            }

            function renderRecommendPanel(data) {
                  const aiContainer = document.getElementById('aiPanelContainer');
                  const chatContainer = null; // chat moved inline to my-page

                  if (!data) {
                        aiContainer.innerHTML = `<div class="ai-placeholder">
                              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
                                    <path d="M12 2l2 7h7l-5.5 4 2 7L12 17l-5.5 3 2-7L3 9h7z"/>
                              </svg>
                              <p>点击「刷新推荐」，DeepSeek 将根据你的兴趣生成个性化内容</p>
                              <button class="btn btn-primary" style="margin-top:12px" onclick="fetchRecommendations()">🔮 刷新推荐</button>
                        </div>`;
                        return;
                  }

                  // AI Insights panel: interest tags + recommended topics
                  let html = '';

                  if (data.query_summary) {
                        html += `<div class="ai-overview" style="margin-bottom:12px">
                              <strong style="color:var(--neon-cyan)">兴趣画像：</strong>${escapeHtml(data.query_summary)}
                        </div>`;
                  }

                  if (data.interest_tags && data.interest_tags.length > 0) {
                        html += `<div style="margin-bottom:12px">
                              <div class="my-section-title">兴趣标签</div>
                              <div class="interest-tags">${data.interest_tags.map(t => `<span class="interest-tag">${escapeHtml(t)}</span>`).join('')}</div>
                        </div>`;
                  }

                  if (data.recommended_topics && data.recommended_topics.length > 0) {
                        html += `<div class="my-section-title">为你推荐（${data.recommended_topics.length}条）</div>
                        <div style="display:flex;flex-direction:column;gap:6px">`;
                        for (const item of data.recommended_topics) {
                              html += `<a class="recommend-topic-item" ${item.url ? `href="${escapeAttr(item.url)}" target="_blank" rel="noopener noreferrer"` : ''}>
                                    <div class="recommend-topic-title">${escapeHtml(item.title)}</div>
                                    <div class="recommend-topic-meta">
                                          <span>${PLATFORM_NAMES[item.platform] || escapeHtml(item.platform || '')}</span>
                                          ${item.reason ? `<span class="recommend-reason">· ${escapeHtml(item.reason)}</span>` : ''}
                                    </div>
                              </a>`;
                        }
                        html += '</div>';
                  }

                  html += `<button class="btn btn-primary" style="margin-top:14px;width:100%" onclick="fetchRecommendations()">🔮 刷新推荐</button>`;
                  aiContainer.innerHTML = html;

                  // Chat area: report + RSS articles
                  const chatMessages = document.getElementById('chatMessages');
                  if (chatMessages) {
                        let chatHtml = '<div class="chat-msg ai"><strong>📊 个性化报告</strong><br>';
                        chatHtml += data.report ? formatChatText(data.report) : '暂无报告';
                        chatHtml += '</div>';

                        if (data.fetched_articles && data.fetched_articles.length > 0) {
                              chatHtml += `<div class="chat-msg ai"><strong>📰 关键词抓取（${data.fetched_articles.length}篇）</strong>
                              <div class="articles-list" style="margin-top:8px">`;
                              for (const a of data.fetched_articles) {
                                    chatHtml += `<a class="article-item" href="${escapeAttr(a.url)}" target="_blank" rel="noopener noreferrer">
                                          <div class="article-title">${escapeHtml(a.title)}</div>
                                          <div class="article-meta">
                                                <span class="article-kw-badge">${escapeHtml(a.keyword)}</span>
                                                <span>${escapeHtml(a.source || '')}</span>
                                          </div>
                                    </a>`;
                              }
                              chatHtml += '</div></div>';
                        }
                        chatMessages.innerHTML = chatHtml;
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                  }
            }

            // ==================== AI ====================
            async function aiAnalyze() {
                  if (currentPlatform === 'mine') {
                        return fetchRecommendations();
                  }
                  const btn = document.getElementById('btnAnalyze');
                  btn.classList.add('loading');
                  const container = document.getElementById('aiPanelContainer');
                  container.innerHTML = '<div class="loading-skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';

                  try {
                        const res = await fetch(`${API}/api/analyze`, { method: 'POST' });
                        if (!res.ok) {
                              const err = await res.json();
                              throw new Error(err.detail || 'AI 分析失败');
                        }
                        const data = await res.json();
                        analysisCount++;
                        document.getElementById('statAnalyses').textContent = analysisCount;
                        renderAIPanel(data);
                        showToast('AI 分析完成', 'success');
                  } catch (e) {
                        container.innerHTML = `<div class="ai-placeholder"><p style="color:var(--neon-red)">${escapeHtml(e.message)}</p></div>`;
                        showToast('AI 分析失败: ' + e.message, 'error');
                  } finally {
                        btn.classList.remove('loading');
                  }
            }

            function renderAIPanel(data) {
                  const container = document.getElementById('aiPanelContainer');
                  if (data.error) {
                        container.innerHTML = `<div class="ai-placeholder"><p style="color:var(--neon-red)">${escapeHtml(data.error)}</p></div>`;
                        return;
                  }

                  let html = '';

                  if (data.overview) {
                        html += `<div class="ai-overview">${escapeHtml(data.overview)}</div>`;
                  }

                  if (data.clusters) {
                        html += '<div class="ai-panel-content">';
                        for (const cluster of data.clusters) {
                              const trendMap = { rising: '上升', stable: '稳定', falling: '下降' };
                              const badgeClass = cluster.trend === 'rising' ? 'badge-rising' : cluster.trend === 'falling' ? 'badge-falling' : 'badge-stable';
                              html += `<div class="ai-cluster">
        <div class="ai-cluster-header">
          <div class="ai-cluster-name">${escapeHtml(cluster.name)}</div>
          <span class="ai-cluster-badge ${badgeClass}">${trendMap[cluster.trend] || cluster.trend}</span>
        </div>
        <div class="ai-cluster-summary">${escapeHtml(cluster.summary || '')}</div>
        <div class="ai-heat-bar"><div class="ai-heat-bar-fill" style="width:${cluster.heat_score || 50}%"></div></div>
      </div>`;
                        }
                        html += '</div>';
                  }

                  if (data.recommendation) {
                        html += `<div class="ai-overview" style="margin-top:12px;border-color:rgba(255,0,255,0.15);background:linear-gradient(135deg,rgba(255,0,255,0.05),rgba(0,255,255,0.03))">
      <strong style="color:var(--neon-magenta)">推荐关注：</strong> ${escapeHtml(data.recommendation)}
    </div>`;
                  }

                  container.innerHTML = html;
            }

            async function analyzeTopic(title) {
                  openModal('分析中...', '<div class="loading-skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>');

                  try {
                        const res = await fetch(`${API}/api/analyze/topic`, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ topic: title })
                        });
                        const data = await res.json();
                        analysisCount++;
                        document.getElementById('statAnalyses').textContent = analysisCount;
                        renderTopicAnalysis(data);
                  } catch (e) {
                        document.getElementById('modalBody').innerHTML = `<p style="color:var(--neon-red)">${escapeHtml(e.message)}</p>`;
                  }
            }

            function renderTopicAnalysis(data) {
                  if (data.error) {
                        document.getElementById('modalTitle').textContent = '分析失败';
                        document.getElementById('modalBody').innerHTML = `<p style="color:var(--neon-red)">${escapeHtml(data.error)}</p>`;
                        return;
                  }

                  document.getElementById('modalTitle').textContent = data.title || '话题分析';

                  let html = '';

                  if (data.impact_score !== undefined) {
                        html += `<div class="analysis-section" style="text-align:center">
      <div class="analysis-label">影响力指数</div>
      <div class="analysis-score">${data.impact_score}</div>
    </div>`;
                  }

                  if (data.category) {
                        html += `<div class="analysis-section"><div class="analysis-label">分类</div>
      <div class="analysis-tags"><span class="analysis-tag">${escapeHtml(data.category)}</span></div></div>`;
                  }

                  if (data.background) {
                        html += `<div class="analysis-section"><div class="analysis-label">背景</div>
      <div class="analysis-text">${escapeHtml(data.background)}</div></div>`;
                  }

                  if (data.public_opinion) {
                        html += `<div class="analysis-section"><div class="analysis-label">舆论分析</div>`;
                        if (data.public_opinion.positive) html += `<div class="analysis-text" style="margin-bottom:4px"><span style="color:var(--neon-green)">正面：</span>${escapeHtml(data.public_opinion.positive)}</div>`;
                        if (data.public_opinion.negative) html += `<div class="analysis-text" style="margin-bottom:4px"><span style="color:var(--neon-red)">负面：</span>${escapeHtml(data.public_opinion.negative)}</div>`;
                        if (data.public_opinion.neutral) html += `<div class="analysis-text"><span style="color:var(--neon-cyan)">中立：</span>${escapeHtml(data.public_opinion.neutral)}</div>`;
                        html += '</div>';
                  }

                  if (data.trend_prediction) {
                        html += `<div class="analysis-section"><div class="analysis-label">趋势预测</div>
      <div class="analysis-text">${escapeHtml(data.trend_prediction)}</div></div>`;
                  }

                  if (data.related_topics && data.related_topics.length > 0) {
                        html += `<div class="analysis-section"><div class="analysis-label">关联话题</div>
      <div class="analysis-tags">${data.related_topics.map(t => `<span class="analysis-tag" style="cursor:pointer" onclick="closeModal();analyzeTopic('${escapeAttr(t)}')">${escapeHtml(t)}</span>`).join('')}</div></div>`;
                  }

                  document.getElementById('modalBody').innerHTML = html;
            }

            // ==================== CHAT ====================
            // Convert lightweight markdown (bold + newlines) to safe HTML
            function formatChatText(text) {
                  return escapeHtml(text)
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
            }

            async function sendChat() {
                  const input = document.getElementById('chatInput');
                  const msg = input.value.trim();
                  if (!msg) return;
                  input.value = '';
                  // Disable input while waiting
                  input.disabled = true;

                  const messages = document.getElementById('chatMessages');
                  const userDiv = document.createElement('div');
                  userDiv.className = 'chat-msg user';
                  userDiv.textContent = msg;
                  messages.appendChild(userDiv);

                  const pendingDiv = document.createElement('div');
                  pendingDiv.className = 'chat-msg ai';
                  pendingDiv.id = 'chatPending';
                  pendingDiv.innerHTML = `<div class="chat-typing"><span></span><span></span><span></span></div>`;
                  messages.appendChild(pendingDiv);
                  messages.scrollTop = messages.scrollHeight;

                  try {
                        const res = await fetch(`${API}/api/chat`, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ question: msg })
                        });
                        const data = await res.json();
                        const pending = document.getElementById('chatPending');
                        if (pending) {
                              pending.id = '';
                              pending.innerHTML = formatChatText(data.answer || '抱歉，我暂时无法回答这个问题。');
                        }
                  } catch (e) {
                        const pending = document.getElementById('chatPending');
                        if (pending) {
                              pending.id = '';
                              pending.innerHTML = `<span style="color:var(--neon-red)">请求失败: ${escapeHtml(e.message)}</span>`;
                        }
                  }
                  input.disabled = false;
                  input.focus();
                  messages.scrollTop = messages.scrollHeight;
            }

            // ==================== AUTO-REFRESH ====================
            function startAutoRefresh() {
                  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
                  autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
                  updateCountdownUI();

                  autoRefreshTimer = setInterval(() => {
                        if (!autoRefreshEnabled) return;
                        autoRefreshCountdown--;
                        updateCountdownUI();

                        if (autoRefreshCountdown <= 0) {
                              autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
                              refreshData();
                        }
                  }, 1000);
            }

            function toggleAutoRefresh() {
                  autoRefreshEnabled = !autoRefreshEnabled;
                  const toggle = document.getElementById('autoRefreshToggle');
                  toggle.classList.toggle('active', autoRefreshEnabled);

                  if (autoRefreshEnabled) {
                        autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
                        showToast('自动刷新已开启（每5分钟）', 'success');
                  } else {
                        showToast('自动刷新已关闭', 'info');
                  }
                  updateCountdownUI();
            }

            function updateCountdownUI() {
                  const label = document.getElementById('autoRefreshLabel');
                  const arc = document.getElementById('countdownArc');
                  const circumference = 2 * Math.PI * 10; // r=10

                  if (!autoRefreshEnabled) {
                        label.textContent = '已暂停';
                        arc.style.strokeDashoffset = circumference;
                        arc.style.stroke = 'var(--text-muted)';
                        return;
                  }

                  const mins = Math.floor(autoRefreshCountdown / 60);
                  const secs = autoRefreshCountdown % 60;
                  label.textContent = `${mins}:${String(secs).padStart(2, '0')}`;

                  const progress = autoRefreshCountdown / AUTO_REFRESH_INTERVAL;
                  arc.style.strokeDashoffset = circumference * (1 - progress);
                  arc.style.stroke = progress < 0.2 ? 'var(--neon-amber)' : 'var(--neon-green)';
            }

            // ==================== MODAL ====================
            function openModal(title, bodyHtml) {
                  document.getElementById('modalTitle').textContent = title;
                  document.getElementById('modalBody').innerHTML = bodyHtml;
                  document.getElementById('modalOverlay').classList.add('active');
                  document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                  document.getElementById('modalOverlay').classList.remove('active');
                  document.body.style.overflow = '';
            }

            document.addEventListener('keydown', (e) => {
                  if (e.key === 'Escape') closeModal();
            });

            // ==================== TOAST ====================
            function showToast(message, type = 'info') {
                  const container = document.getElementById('toastContainer');
                  const toast = document.createElement('div');
                  toast.className = `toast toast-${type}`;
                  toast.textContent = message;
                  container.appendChild(toast);
                  setTimeout(() => {
                        toast.style.opacity = '0';
                        toast.style.transform = 'translateX(20px)';
                        toast.style.transition = 'all 0.3s ease';
                        setTimeout(() => toast.remove(), 300);
                  }, 3000);
            }

            // ==================== UTILS ====================
            function escapeHtml(str) {
                  if (!str) return '';
                  const div = document.createElement('div');
                  div.textContent = str;
                  return div.innerHTML;
            }

            function escapeAttr(str) {
                  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            }
      </script>

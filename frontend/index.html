<!DOCTYPE html>
<html lang="zh-CN">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AI Hot Research - 热点监控</title>
      <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0A0F'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='20'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">
      <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script> -->
      <style>
            /* ============ DESIGN TOKENS ============ */
            :root {
                  --bg-void: #0A0A0F;
                  --bg-surface: #111118;
                  --bg-card: #16161F;
                  --bg-card-hover: #1C1C28;
                  --border-dim: rgba(255, 255, 255, 0.06);
                  --border-glow: rgba(0, 255, 255, 0.15);

                  --neon-cyan: #00FFFF;
                  --neon-magenta: #FF00FF;
                  --neon-green: #00FF88;
                  --neon-amber: #FFB800;
                  --neon-red: #FF3366;
                  --neon-blue: #3388FF;

                  --text-primary: #E8E8F0;
                  --text-secondary: #8888A0;
                  --text-muted: #555570;

                  --font-mono: 'Fira Code', monospace;
                  --font-sans: 'Fira Sans', sans-serif;

                  --radius: 12px;
                  --radius-sm: 8px;
                  --glow-cyan: 0 0 20px rgba(0, 255, 255, 0.15), 0 0 60px rgba(0, 255, 255, 0.05);
                  --glow-magenta: 0 0 20px rgba(255, 0, 255, 0.15), 0 0 60px rgba(255, 0, 255, 0.05);
                  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* ============ RESET & BASE ============ */
            *,
            *::before,
            *::after {
                  box-sizing: border-box;
                  margin: 0;
                  padding: 0;
            }

            body {
                  font-family: var(--font-sans);
                  background: var(--bg-void);
                  color: var(--text-primary);
                  min-height: 100vh;
                  overflow-x: hidden;
                  -webkit-font-smoothing: antialiased;
            }

            /* Scanline overlay */
            body::after {
                  content: '';
                  position: fixed;
                  inset: 0;
                  background: repeating-linear-gradient(0deg,
                              transparent,
                              transparent 2px,
                              rgba(0, 0, 0, 0.03) 2px,
                              rgba(0, 0, 0, 0.03) 4px);
                  pointer-events: none;
                  z-index: 9999;
            }

            @media (prefers-reduced-motion: reduce) {

                  *,
                  *::before,
                  *::after {
                        animation: none !important;
                        transition-duration: 0.01ms !important;
                  }
            }

            /* ============ SCROLLBAR ============ */
            ::-webkit-scrollbar {
                  width: 6px;
            }

            ::-webkit-scrollbar-track {
                  background: var(--bg-void);
            }

            ::-webkit-scrollbar-thumb {
                  background: var(--text-muted);
                  border-radius: 3px;
            }

            ::-webkit-scrollbar-thumb:hover {
                  background: var(--neon-cyan);
            }

            /* ============ LAYOUT ============ */
            .app-wrapper {
                  display: flex;
                  flex-direction: column;
                  min-height: 100vh;
            }

            /* ============ NAVBAR ============ */
            .navbar {
                  position: sticky;
                  top: 0;
                  z-index: 100;
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  padding: 0 24px;
                  height: 56px;
                  background: rgba(10, 10, 15, 0.85);
                  backdrop-filter: blur(16px) saturate(1.2);
                  border-bottom: 1px solid var(--border-dim);
            }

            .navbar-brand {
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  font-family: var(--font-mono);
                  font-weight: 700;
                  font-size: 16px;
                  color: var(--neon-cyan);
                  text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
                  user-select: none;
            }

            .navbar-brand svg {
                  flex-shrink: 0;
            }

            .navbar-actions {
                  display: flex;
                  align-items: center;
                  gap: 8px;
            }

            /* ============ BUTTONS ============ */
            .btn {
                  display: inline-flex;
                  align-items: center;
                  gap: 6px;
                  padding: 8px 16px;
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius-sm);
                  background: var(--bg-card);
                  color: var(--text-primary);
                  font-family: var(--font-sans);
                  font-size: 13px;
                  font-weight: 500;
                  cursor: pointer;
                  transition: all var(--transition);
                  white-space: nowrap;
            }

            .btn:hover {
                  background: var(--bg-card-hover);
                  border-color: var(--border-glow);
                  box-shadow: var(--glow-cyan);
            }

            .btn:active {
                  transform: scale(0.97);
            }

            .btn:focus-visible {
                  outline: 2px solid var(--neon-cyan);
                  outline-offset: 2px;
            }

            .btn svg {
                  width: 16px;
                  height: 16px;
                  flex-shrink: 0;
            }

            .btn-primary {
                  background: linear-gradient(135deg, rgba(0, 255, 255, 0.12), rgba(255, 0, 255, 0.08));
                  border-color: rgba(0, 255, 255, 0.25);
                  color: var(--neon-cyan);
            }

            .btn-primary:hover {
                  background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.12));
                  box-shadow: var(--glow-cyan);
            }

            .btn-ai {
                  background: linear-gradient(135deg, rgba(255, 0, 255, 0.12), rgba(0, 255, 255, 0.08));
                  border-color: rgba(255, 0, 255, 0.25);
                  color: var(--neon-magenta);
            }

            .btn-ai:hover {
                  background: linear-gradient(135deg, rgba(255, 0, 255, 0.2), rgba(0, 255, 255, 0.12));
                  box-shadow: var(--glow-magenta);
            }

            .btn.loading {
                  pointer-events: none;
                  opacity: 0.7;
            }

            .btn.loading::after {
                  content: '';
                  width: 14px;
                  height: 14px;
                  border: 2px solid transparent;
                  border-top-color: currentColor;
                  border-radius: 50%;
                  animation: spin 0.6s linear infinite;
            }

            @keyframes spin {
                  to {
                        transform: rotate(360deg);
                  }
            }

            /* ============ MAIN CONTENT ============ */
            .main-content {
                  flex: 1;
                  padding: 20px 24px 40px;
                  max-width: 1440px;
                  margin: 0 auto;
                  width: 100%;
            }

            /* ============ STATS BAR ============ */
            .stats-bar {
                  display: grid;
                  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                  gap: 12px;
                  margin-bottom: 20px;
            }

            .stat-card {
                  display: flex;
                  align-items: center;
                  gap: 12px;
                  padding: 16px;
                  background: var(--bg-card);
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius);
                  transition: all var(--transition);
            }

            .stat-card:hover {
                  border-color: var(--border-glow);
                  box-shadow: var(--glow-cyan);
            }

            .stat-icon {
                  width: 40px;
                  height: 40px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border-radius: 10px;
                  flex-shrink: 0;
            }

            .stat-icon.cyan {
                  background: rgba(0, 255, 255, 0.1);
                  color: var(--neon-cyan);
            }

            .stat-icon.magenta {
                  background: rgba(255, 0, 255, 0.1);
                  color: var(--neon-magenta);
            }

            .stat-icon.green {
                  background: rgba(0, 255, 136, 0.1);
                  color: var(--neon-green);
            }

            .stat-icon.amber {
                  background: rgba(255, 184, 0, 0.1);
                  color: var(--neon-amber);
            }

            .stat-info {
                  flex: 1;
                  min-width: 0;
            }

            .stat-label {
                  font-size: 12px;
                  color: var(--text-muted);
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                  font-family: var(--font-mono);
            }

            .stat-value {
                  font-size: 24px;
                  font-weight: 700;
                  font-family: var(--font-mono);
                  line-height: 1.2;
            }

            /* ============ BENTO GRID ============ */
            .bento-grid {
                  display: grid;
                  grid-template-columns: repeat(12, 1fr);
                  gap: 12px;
            }

            /* Two-column main content area */
            .content-columns {
                  grid-column: span 12;
                  display: grid;
                  grid-template-columns: 7fr 5fr;
                  gap: 12px;
                  align-items: stretch;
            }

            .right-panels {
                  display: flex;
                  flex-direction: column;
                  gap: 12px;
                  min-height: 0;
            }

            .bento-card {
                  background: var(--bg-card);
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius);
                  overflow: hidden;
                  transition: all var(--transition);
                  display: flex;
                  flex-direction: column;
            }

            .bento-card:hover {
                  border-color: var(--border-glow);
                  box-shadow: var(--glow-cyan);
            }

            .bento-card-header {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  padding: 14px 16px 10px;
                  border-bottom: 1px solid var(--border-dim);
            }

            .bento-card-title {
                  font-family: var(--font-mono);
                  font-size: 13px;
                  font-weight: 600;
                  color: var(--text-secondary);
                  display: flex;
                  align-items: center;
                  gap: 8px;
            }

            .bento-card-title .dot {
                  width: 8px;
                  height: 8px;
                  border-radius: 50%;
                  flex-shrink: 0;
            }

            .bento-card-body {
                  flex: 1;
                  padding: 12px 16px 16px;
                  overflow-y: auto;
            }

            /* Platform tabs card */
            .card-platforms {
                  grid-column: span 12;
                  grid-row: span 1;
            }

            /* Topic lists */
            .card-topics {
                  min-height: 520px;
            }

            .card-ai-panel {
                  flex: 1;
                  min-height: 300px;
                  overflow: hidden;
            }

            /* Inline chat section inside card-topics (shown on 我的 tab) */
            .my-chat-section {
                  flex-shrink: 0;
                  height: 380px;
                  border-bottom: 1px solid var(--border-dim);
                  padding: 10px 16px 12px;
                  display: flex;
                  flex-direction: column;
            }

            .my-chat-section .chat-container {
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  min-height: 0;
            }

            /* Chart full width below (disabled)
            .card-chart {
                  grid-column: span 12;
                  grid-row: span 4;
            } */

            /* ============ PLATFORM TABS ============ */
            .platform-tabs {
                  display: flex;
                  gap: 6px;
                  padding: 4px;
                  overflow-x: auto;
                  scrollbar-width: none;
            }

            .platform-tabs::-webkit-scrollbar {
                  display: none;
            }

            .platform-tab {
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  padding: 8px 14px;
                  border: 1px solid transparent;
                  border-radius: var(--radius-sm);
                  background: transparent;
                  color: var(--text-secondary);
                  font-family: var(--font-sans);
                  font-size: 13px;
                  font-weight: 500;
                  cursor: pointer;
                  transition: all var(--transition);
                  white-space: nowrap;
            }

            .platform-tab:hover {
                  background: var(--bg-card-hover);
                  color: var(--text-primary);
            }

            .platform-tab.active {
                  background: rgba(0, 255, 255, 0.08);
                  border-color: rgba(0, 255, 255, 0.2);
                  color: var(--neon-cyan);
            }

            .platform-tab .tab-count {
                  font-family: var(--font-mono);
                  font-size: 11px;
                  padding: 1px 6px;
                  border-radius: 4px;
                  background: rgba(255, 255, 255, 0.06);
            }

            .platform-tab.active .tab-count {
                  background: rgba(0, 255, 255, 0.15);
                  color: var(--neon-cyan);
            }

            /* ============ TOPIC LIST ============ */
            .topic-list {
                  display: flex;
                  flex-direction: column;
                  gap: 2px;
            }

            /* Pagination */
            .pagination {
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 6px;
                  padding: 10px 0 4px;
                  border-top: 1px solid var(--border-dim);
                  margin-top: 4px;
            }

            .page-btn {
                  min-width: 32px;
                  height: 30px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border: 1px solid var(--border-dim);
                  border-radius: 6px;
                  background: var(--bg-surface);
                  color: var(--text-muted);
                  font-family: var(--font-mono);
                  font-size: 12px;
                  cursor: pointer;
                  transition: all var(--transition);
                  padding: 0 8px;
            }

            .page-btn:hover:not(:disabled) {
                  border-color: var(--neon-cyan);
                  color: var(--neon-cyan);
            }

            .page-btn.active {
                  background: rgba(0, 255, 255, 0.1);
                  border-color: var(--neon-cyan);
                  color: var(--neon-cyan);
                  box-shadow: 0 0 8px rgba(0, 255, 255, 0.15);
            }

            .page-btn:disabled {
                  opacity: 0.3;
                  cursor: not-allowed;
            }

            .page-info {
                  font-family: var(--font-mono);
                  font-size: 11px;
                  color: var(--text-muted);
                  padding: 0 6px;
            }

            .topic-item {
                  display: flex;
                  align-items: center;
                  gap: 12px;
                  padding: 10px 12px;
                  border-radius: var(--radius-sm);
                  cursor: pointer;
                  transition: all var(--transition);
                  text-decoration: none;
                  color: inherit;
            }

            .topic-item:hover {
                  background: var(--bg-card-hover);
            }

            .topic-rank {
                  font-family: var(--font-mono);
                  font-size: 13px;
                  font-weight: 700;
                  width: 28px;
                  height: 28px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border-radius: 6px;
                  flex-shrink: 0;
                  background: rgba(255, 255, 255, 0.04);
                  color: var(--text-muted);
            }

            .topic-rank.top-1 {
                  background: rgba(255, 51, 102, 0.15);
                  color: var(--neon-red);
                  text-shadow: 0 0 8px rgba(255, 51, 102, 0.5);
            }

            .topic-rank.top-2 {
                  background: rgba(255, 184, 0, 0.12);
                  color: var(--neon-amber);
            }

            .topic-rank.top-3 {
                  background: rgba(0, 255, 255, 0.1);
                  color: var(--neon-cyan);
            }

            .topic-content {
                  flex: 1;
                  min-width: 0;
            }

            .topic-title {
                  font-size: 14px;
                  font-weight: 500;
                  line-height: 1.4;
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  color: var(--text-primary);
            }

            .topic-meta {
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  margin-top: 2px;
            }

            .topic-heat {
                  font-family: var(--font-mono);
                  font-size: 11px;
                  color: var(--text-muted);
            }

            .topic-category {
                  font-size: 11px;
                  padding: 1px 6px;
                  border-radius: 4px;
                  background: rgba(255, 0, 255, 0.08);
                  color: var(--neon-magenta);
            }

            .topic-actions {
                  display: flex;
                  gap: 4px;
                  opacity: 0;
                  transition: opacity var(--transition);
            }

            .topic-item:hover .topic-actions {
                  opacity: 1;
            }

            .topic-action-btn {
                  width: 28px;
                  height: 28px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border: 1px solid var(--border-dim);
                  border-radius: 6px;
                  background: var(--bg-card);
                  color: var(--text-muted);
                  cursor: pointer;
                  transition: all var(--transition);
            }

            .topic-action-btn:hover {
                  border-color: rgba(255, 0, 255, 0.3);
                  color: var(--neon-magenta);
                  box-shadow: 0 0 10px rgba(255, 0, 255, 0.1);
            }

            .topic-action-btn svg {
                  width: 14px;
                  height: 14px;
            }

            .topic-action-btn.like-btn.liked {
                  color: var(--neon-red);
                  border-color: rgba(255, 51, 102, 0.4);
            }

            .topic-action-btn.like-btn:hover {
                  border-color: rgba(255, 51, 102, 0.4);
                  color: var(--neon-red);
                  box-shadow: 0 0 10px rgba(255, 51, 102, 0.15);
            }

            /* ============ MY PAGE ============ */
            .my-page {
                  display: flex;
                  flex-direction: column;
                  gap: 16px;
                  height: 100%;
                  overflow-y: auto;
            }

            .my-section-title {
                  font-family: var(--font-mono);
                  font-size: 11px;
                  text-transform: uppercase;
                  letter-spacing: 0.1em;
                  color: var(--text-muted);
                  margin-bottom: 8px;
            }

            .keyword-input-row {
                  display: flex;
                  gap: 8px;
                  margin-bottom: 10px;
            }

            .keyword-input {
                  flex: 1;
                  background: var(--bg-surface);
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius-sm);
                  color: var(--text-primary);
                  font-family: var(--font-mono);
                  font-size: 13px;
                  padding: 6px 10px;
                  outline: none;
                  transition: border-color var(--transition);
            }

            .keyword-input:focus {
                  border-color: rgba(0, 255, 255, 0.3);
            }

            .keyword-tags {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 6px;
            }

            .keyword-tag {
                  display: inline-flex;
                  align-items: center;
                  gap: 4px;
                  padding: 3px 8px;
                  background: rgba(0, 255, 255, 0.08);
                  border: 1px solid rgba(0, 255, 255, 0.15);
                  border-radius: 20px;
                  font-size: 12px;
                  color: var(--neon-cyan);
                  font-family: var(--font-mono);
            }

            .keyword-tag-remove {
                  background: none;
                  border: none;
                  color: var(--text-muted);
                  cursor: pointer;
                  font-size: 14px;
                  line-height: 1;
                  padding: 0;
                  display: flex;
                  align-items: center;
                  transition: color var(--transition);
            }

            .keyword-tag-remove:hover {
                  color: var(--neon-red);
            }

            .interest-tags {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 6px;
                  margin-top: 6px;
            }

            .interest-tag {
                  padding: 3px 10px;
                  background: rgba(255, 0, 255, 0.08);
                  border: 1px solid rgba(255, 0, 255, 0.2);
                  border-radius: 20px;
                  font-size: 12px;
                  color: var(--neon-magenta);
                  font-family: var(--font-mono);
            }

            .recommend-topic-item {
                  display: flex;
                  flex-direction: column;
                  gap: 2px;
                  padding: 8px 10px;
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius-sm);
                  background: var(--bg-surface);
                  text-decoration: none;
                  color: var(--text-primary);
                  transition: all var(--transition);
            }

            .recommend-topic-item:hover {
                  border-color: rgba(0, 255, 255, 0.2);
                  background: var(--bg-card-hover);
            }

            .recommend-topic-title {
                  font-size: 13px;
                  line-height: 1.4;
            }

            .recommend-topic-meta {
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  font-size: 11px;
                  color: var(--text-muted);
            }

            .recommend-reason {
                  font-size: 11px;
                  color: var(--neon-cyan);
                  opacity: 0.8;
            }

            .personal-report {
                  padding: 12px;
                  background: var(--bg-surface);
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius-sm);
                  font-size: 13px;
                  line-height: 1.7;
                  color: var(--text-secondary);
                  white-space: pre-wrap;
            }

            .articles-list {
                  display: flex;
                  flex-direction: column;
                  gap: 8px;
            }

            /* ============ DISCOVER TABS (我的页面内 tab 切换) ============ */
            .discover-tabs {
                  display: flex;
                  gap: 0;
                  border-bottom: 1px solid var(--border-dim);
                  margin-bottom: 10px;
            }

            .discover-tab {
                  padding: 7px 14px;
                  font-size: 12px;
                  font-family: var(--font-mono);
                  color: var(--text-muted);
                  background: none;
                  border: none;
                  border-bottom: 2px solid transparent;
                  cursor: pointer;
                  transition: all var(--transition);
                  white-space: nowrap;
                  margin-bottom: -1px;
            }

            .discover-tab:hover {
                  color: var(--text-primary);
            }

            .discover-tab.active {
                  color: var(--neon-cyan);
                  border-bottom-color: var(--neon-cyan);
            }

            .discover-tab .dtab-count {
                  font-size: 10px;
                  padding: 1px 5px;
                  border-radius: 4px;
                  background: rgba(255, 255, 255, 0.06);
                  margin-left: 4px;
            }

            .discover-tab.active .dtab-count {
                  background: rgba(0, 255, 255, 0.12);
                  color: var(--neon-cyan);
            }

            .discover-pane {
                  display: none;
            }

            .discover-pane.active {
                  display: block;
            }

            .article-item {
                  padding: 8px 10px;
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius-sm);
                  background: var(--bg-surface);
                  text-decoration: none;
                  color: var(--text-primary);
                  transition: all var(--transition);
                  display: block;
            }

            .article-item:hover {
                  border-color: rgba(139, 92, 246, 0.3);
                  background: var(--bg-card-hover);
            }

            .article-title {
                  font-size: 13px;
                  margin-bottom: 3px;
                  line-height: 1.4;
            }

            .article-meta {
                  font-size: 11px;
                  color: var(--text-muted);
                  display: flex;
                  gap: 8px;
            }

            .article-kw-badge {
                  padding: 1px 6px;
                  border-radius: 4px;
                  background: rgba(139, 92, 246, 0.12);
                  color: #8B5CF6;
                  font-size: 10px;
                  font-family: var(--font-mono);
            }

            .platform-tab.mine-tab {
                  color: var(--neon-amber) !important;
                  border-color: rgba(255, 184, 0, 0.2) !important;
            }

            .platform-tab.mine-tab.active {
                  background: rgba(255, 184, 0, 0.1) !important;
                  border-color: rgba(255, 184, 0, 0.4) !important;
                  color: var(--neon-amber) !important;
            }

            /* ============ AI PANEL ============ */
            .ai-panel-content {
                  display: flex;
                  flex-direction: column;
                  gap: 12px;
                  height: 100%;
            }

            .ai-cluster {
                  padding: 12px;
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius-sm);
                  background: var(--bg-surface);
                  transition: all var(--transition);
            }

            .ai-cluster:hover {
                  border-color: var(--border-glow);
            }

            .ai-cluster-header {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 6px;
            }

            .ai-cluster-name {
                  font-weight: 600;
                  font-size: 14px;
                  color: var(--text-primary);
            }

            .ai-cluster-badge {
                  font-family: var(--font-mono);
                  font-size: 11px;
                  padding: 2px 8px;
                  border-radius: 4px;
            }

            .badge-rising {
                  background: rgba(255, 51, 102, 0.12);
                  color: var(--neon-red);
            }

            .badge-stable {
                  background: rgba(0, 255, 255, 0.1);
                  color: var(--neon-cyan);
            }

            .badge-falling {
                  background: rgba(136, 136, 160, 0.15);
                  color: var(--text-muted);
            }

            .ai-cluster-summary {
                  font-size: 13px;
                  color: var(--text-secondary);
                  line-height: 1.5;
            }

            .ai-heat-bar {
                  margin-top: 8px;
                  height: 3px;
                  border-radius: 2px;
                  background: rgba(255, 255, 255, 0.06);
                  overflow: hidden;
            }

            .ai-heat-bar-fill {
                  height: 100%;
                  border-radius: 2px;
                  background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
                  transition: width 0.5s ease;
            }

            .ai-overview {
                  padding: 12px;
                  border-radius: var(--radius-sm);
                  background: linear-gradient(135deg, rgba(0, 255, 255, 0.05), rgba(255, 0, 255, 0.03));
                  border: 1px solid rgba(0, 255, 255, 0.1);
                  font-size: 13px;
                  line-height: 1.6;
                  color: var(--text-secondary);
            }

            .ai-placeholder {
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  justify-content: center;
                  gap: 12px;
                  color: var(--text-muted);
                  text-align: center;
                  padding: 20px;
            }

            .ai-placeholder svg {
                  width: 48px;
                  height: 48px;
                  opacity: 0.3;
            }

            .ai-placeholder p {
                  font-size: 13px;
                  max-width: 200px;
                  line-height: 1.5;
            }

            /* ============ CHART ============ */
            .chart-container {
                  position: relative;
                  height: 100%;
                  min-height: 260px;
            }

            .chart-container canvas {
                  width: 100% !important;
                  height: 100% !important;
            }

            /* ============ CHAT ============ */
            .chat-container {
                  display: flex;
                  flex-direction: column;
                  height: 100%;
            }

            .chat-messages {
                  flex: 1;
                  overflow-y: auto;
                  display: flex;
                  flex-direction: column;
                  gap: 10px;
                  padding-bottom: 8px;
            }

            .chat-msg {
                  max-width: 90%;
                  padding: 10px 14px;
                  border-radius: 10px;
                  font-size: 13px;
                  line-height: 1.6;
                  word-break: break-word;
            }

            .chat-msg.user {
                  align-self: flex-end;
                  background: rgba(0, 255, 255, 0.1);
                  border: 1px solid rgba(0, 255, 255, 0.15);
                  color: var(--neon-cyan);
            }

            .chat-msg.ai {
                  align-self: flex-start;
                  background: var(--bg-surface);
                  border: 1px solid var(--border-dim);
                  color: var(--text-secondary);
            }

            /* Typing indicator dots */
            .chat-typing {
                  display: inline-flex;
                  align-items: center;
                  gap: 5px;
                  padding: 2px 0;
            }

            .chat-typing span {
                  width: 7px;
                  height: 7px;
                  border-radius: 50%;
                  background: var(--neon-cyan);
                  opacity: 0.3;
                  animation: chatBounce 1.2s ease-in-out infinite;
            }

            .chat-typing span:nth-child(2) {
                  animation-delay: 0.2s;
            }

            .chat-typing span:nth-child(3) {
                  animation-delay: 0.4s;
            }

            @keyframes chatBounce {

                  0%,
                  80%,
                  100% {
                        opacity: 0.3;
                        transform: translateY(0);
                  }

                  40% {
                        opacity: 1;
                        transform: translateY(-4px);
                  }
            }

            .chat-input-row {
                  display: flex;
                  gap: 8px;
                  margin-top: 8px;
            }

            .chat-input {
                  flex: 1;
                  padding: 10px 14px;
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius-sm);
                  background: var(--bg-surface);
                  color: var(--text-primary);
                  font-family: var(--font-sans);
                  font-size: 13px;
                  outline: none;
                  transition: border-color var(--transition);
            }

            .chat-input:focus {
                  border-color: var(--neon-cyan);
                  box-shadow: 0 0 0 2px rgba(0, 255, 255, 0.1);
            }

            .chat-input::placeholder {
                  color: var(--text-muted);
            }

            /* ============ MODAL ============ */
            .modal-overlay {
                  position: fixed;
                  inset: 0;
                  background: rgba(0, 0, 0, 0.7);
                  backdrop-filter: blur(8px);
                  z-index: 200;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 20px;
                  opacity: 0;
                  visibility: hidden;
                  transition: all 0.2s ease;
            }

            .modal-overlay.active {
                  opacity: 1;
                  visibility: visible;
            }

            .modal {
                  background: var(--bg-card);
                  border: 1px solid var(--border-dim);
                  border-radius: var(--radius);
                  max-width: 560px;
                  width: 100%;
                  max-height: 80vh;
                  overflow-y: auto;
                  transform: translateY(10px) scale(0.98);
                  transition: transform 0.2s ease;
            }

            .modal-overlay.active .modal {
                  transform: translateY(0) scale(1);
            }

            .modal-header {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  padding: 16px 20px;
                  border-bottom: 1px solid var(--border-dim);
            }

            .modal-title {
                  font-family: var(--font-mono);
                  font-size: 14px;
                  font-weight: 600;
                  color: var(--neon-magenta);
            }

            .modal-close {
                  width: 32px;
                  height: 32px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border: none;
                  border-radius: 6px;
                  background: transparent;
                  color: var(--text-muted);
                  cursor: pointer;
                  transition: all var(--transition);
            }

            .modal-close:hover {
                  background: var(--bg-card-hover);
                  color: var(--text-primary);
            }

            .modal-body {
                  padding: 20px;
            }

            .analysis-section {
                  margin-bottom: 16px;
            }

            .analysis-label {
                  font-family: var(--font-mono);
                  font-size: 11px;
                  color: var(--text-muted);
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                  margin-bottom: 6px;
            }

            .analysis-text {
                  font-size: 14px;
                  line-height: 1.6;
                  color: var(--text-secondary);
            }

            .analysis-tags {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 6px;
            }

            .analysis-tag {
                  font-size: 12px;
                  padding: 3px 10px;
                  border-radius: 4px;
                  background: rgba(0, 255, 255, 0.08);
                  border: 1px solid rgba(0, 255, 255, 0.12);
                  color: var(--neon-cyan);
            }

            .analysis-score {
                  font-family: var(--font-mono);
                  font-size: 32px;
                  font-weight: 700;
                  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
                  -webkit-background-clip: text;
                  -webkit-text-fill-color: transparent;
            }

            /* ============ EMPTY / LOADING ============ */
            .loading-skeleton {
                  display: flex;
                  flex-direction: column;
                  gap: 8px;
            }

            .skeleton-line {
                  height: 14px;
                  border-radius: 4px;
                  background: linear-gradient(90deg, var(--bg-card-hover) 25%, var(--bg-surface) 50%, var(--bg-card-hover) 75%);
                  background-size: 200% 100%;
                  animation: shimmer 1.5s ease infinite;
            }

            .skeleton-line:nth-child(2) {
                  width: 80%;
            }

            .skeleton-line:nth-child(3) {
                  width: 60%;
            }

            @keyframes shimmer {
                  0% {
                        background-position: 200% 0;
                  }

                  100% {
                        background-position: -200% 0;
                  }
            }

            .pulse-dot {
                  width: 8px;
                  height: 8px;
                  border-radius: 50%;
                  background: var(--neon-green);
                  animation: pulse 2s ease infinite;
            }

            @keyframes pulse {

                  0%,
                  100% {
                        opacity: 1;
                        box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4);
                  }

                  50% {
                        opacity: 0.6;
                        box-shadow: 0 0 0 6px rgba(0, 255, 136, 0);
                  }
            }

            /* Toast */
            .toast-container {
                  position: fixed;
                  top: 68px;
                  right: 24px;
                  z-index: 300;
                  display: flex;
                  flex-direction: column;
                  gap: 8px;
            }

            .toast {
                  padding: 10px 16px;
                  border-radius: var(--radius-sm);
                  font-size: 13px;
                  font-family: var(--font-sans);
                  border: 1px solid;
                  animation: toast-in 0.3s ease;
                  max-width: 360px;
            }

            .toast-success {
                  background: rgba(0, 255, 136, 0.1);
                  border-color: rgba(0, 255, 136, 0.2);
                  color: var(--neon-green);
            }

            .toast-error {
                  background: rgba(255, 51, 102, 0.1);
                  border-color: rgba(255, 51, 102, 0.2);
                  color: var(--neon-red);
            }

            .toast-info {
                  background: rgba(0, 255, 255, 0.1);
                  border-color: rgba(0, 255, 255, 0.2);
                  color: var(--neon-cyan);
            }

            @keyframes toast-in {
                  from {
                        opacity: 0;
                        transform: translateX(20px);
                  }
            }

            /* ============ AUTO-REFRESH INDICATOR ============ */
            .auto-refresh-wrap {
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  padding: 4px 12px;
                  border: 1px solid var(--border-dim);
                  border-radius: 20px;
                  background: var(--bg-card);
            }

            .auto-refresh-toggle {
                  position: relative;
                  width: 36px;
                  height: 20px;
                  background: rgba(255, 255, 255, 0.08);
                  border-radius: 10px;
                  cursor: pointer;
                  transition: background var(--transition);
                  border: none;
                  padding: 0;
            }

            .auto-refresh-toggle.active {
                  background: rgba(0, 255, 136, 0.25);
            }

            .auto-refresh-toggle::after {
                  content: '';
                  position: absolute;
                  top: 3px;
                  left: 3px;
                  width: 14px;
                  height: 14px;
                  border-radius: 50%;
                  background: var(--text-muted);
                  transition: all var(--transition);
            }

            .auto-refresh-toggle.active::after {
                  left: 19px;
                  background: var(--neon-green);
                  box-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
            }

            .auto-refresh-label {
                  font-family: var(--font-mono);
                  font-size: 11px;
                  color: var(--text-muted);
                  white-space: nowrap;
                  max-width: 0;
                  overflow: hidden;
                  opacity: 0;
                  transition: all 0.3s ease;
            }

            .auto-refresh-wrap:hover .auto-refresh-label {
                  max-width: 60px;
                  opacity: 1;
                  margin-left: 2px;
            }

            .countdown-ring {
                  width: 22px;
                  height: 22px;
                  flex-shrink: 0;
            }

            .countdown-ring circle {
                  fill: none;
                  stroke-width: 2.5;
            }

            .countdown-ring .bg {
                  stroke: rgba(255, 255, 255, 0.06);
            }

            .countdown-ring .fg {
                  stroke: var(--neon-green);
                  stroke-linecap: round;
                  transform: rotate(-90deg);
                  transform-origin: center;
                  transition: stroke-dashoffset 1s linear;
            }

            /* ============ RESPONSIVE ============ */
            @media (max-width: 1024px) {
                  .content-columns {
                        grid-template-columns: 1fr;
                  }
            }

            @media (max-width: 768px) {
                  .content-columns {
                        grid-template-columns: 1fr;
                  }

                  .main-content {
                        padding: 12px;
                  }

                  .stats-bar {
                        grid-template-columns: repeat(2, 1fr);
                  }

                  .auto-refresh-wrap {
                        display: none;
                  }

                  .navbar {
                        padding: 0 12px;
                  }

                  .stat-card {
                        padding: 12px;
                  }

                  .stat-value {
                        font-size: 20px;
                  }
            }

            @media (max-width: 480px) {
                  .stats-bar {
                        grid-template-columns: 1fr;
                  }
            }
      </style>
</head>

<body>

      <div class="app-wrapper">

                        </div>
                        <div class="stat-card">
                              <div class="stat-icon green">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                          stroke-width="2">
                                          <circle cx="12" cy="12" r="10" />

                              <div class="stat-info">

                                          <path
                                                d="M12 2a4 4 0 0 0-4 4c0 2 1 3 2 4l-5 7h14l-5-7c1-1 2-2 2-4a4 4 0 0 0-4-4z" />

                  <!-- BENTO GRID -->

            <div class="modal" role="dialog" aria-modal="true">
                  <div class="modal-header">
                        <div class="modal-title" id="modalTitle">话题分析</div>
                        <button class="modal-close" onclick="closeModal()" aria-label="关闭">
                              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18" />
                                    <line x1="6" y1="6" x2="18" y2="18" />
                              </svg>
                        </button>
                  </div>
                  <div class="modal-body" id="modalBody"></div>
            </div>
      </div>

      <script>
            // ==================== STATE ====================
            const API = '';  // same origin
            let allTopics = {};
            let currentPlatform = 'mine';
            let analysisCount = 0;
            // let heatChart = null;

            // Pagination
            const PAGE_SIZE = 20;
            let currentPage = 1;

            // Auto-refresh (5 minutes)
            const AUTO_REFRESH_INTERVAL = 5 * 60;
            let autoRefreshEnabled = true;
            let autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
            let autoRefreshTimer = null;

            // My Page
            let myLikes = {};    // {title: {platform, url}}
            let myKeywords = []; // [{id, value}] — synced from backend
            let myRecommendData = null; // last recommend API result

            const PLATFORM_NAMES = {
                  weibo: '微博热搜', zhihu: '知乎热榜', baidu: '百度热搜',
                  douyin: '抖音热点', bilibili: 'B站热门',
                  // twitter: 'X 热点', reddit: 'Reddit',
                  github: 'GitHub Trending', hackernews: 'Hacker News'
            };
            const PLATFORM_COLORS = {
                  weibo: '#FF3366', zhihu: '#0066FF', baidu: '#3388FF',
                  douyin: '#00FFFF', bilibili: '#FF00FF',
                  // twitter: '#1DA1F2', reddit: '#FF4500',
                  github: '#8B5CF6', hackernews: '#FF6600'
            };

            // ==================== INIT ====================
            document.addEventListener('DOMContentLoaded', () => {
                  loadPreferences();
                  refreshData();
                  startAutoRefresh();
            });

            // ==================== DATA ====================
            async function refreshData() {
                  const btn = document.getElementById('btnRefresh');
                  btn.classList.add('loading');
                  try {
                        const res = await fetch(`${API}/api/topics?refresh=true`);
                        const data = await res.json();
                        allTopics = data.platforms || {};
                        updateUI();
                        showToast('数据已更新', 'success');
                        // Reset countdown after refresh
                        autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
                        updateCountdownUI();
                  } catch (e) {
                        showToast('获取数据失败: ' + e.message, 'error');
                  } finally {
                        btn.classList.remove('loading');
                  }
            }

            function updateUI() {
                  updateStats();
                  updatePlatformTabs();
                  const chatSection = document.getElementById('myChatSection');
                  if (chatSection) chatSection.style.display = currentPlatform === 'mine' ? 'flex' : 'none';
                  if (currentPlatform === 'mine') {
                        renderMyPage();
                  } else {
                        renderTopics();
                  }
                  // updateChart();
            }

            function updateStats() {
                  let total = 0;
                  let activePlatforms = 0;
                  for (const [k, v] of Object.entries(allTopics)) {
                        if (v && v.length > 0) {
                              total += v.length;
                              activePlatforms++;
                        }
                  }
                  document.getElementById('statTotal').textContent = total;
                  document.getElementById('statPlatforms').textContent = activePlatforms;
                  document.getElementById('statTime').textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                  document.getElementById('statAnalyses').textContent = analysisCount;
            }

            function updatePlatformTabs() {
                  const tabs = document.getElementById('platformTabs');
                  let total = 0;
                  for (const v of Object.values(allTopics)) total += (v ? v.length : 0);

                  // 全部平台 first
                  let html = `<button class="platform-tab ${currentPlatform === 'all' ? 'active' : ''}" data-platform="all" role="tab" onclick="switchPlatform('all')">
    全部平台 <span class="tab-count">${total}</span>
  </button>`;

                  // ⭐ 我的 second — no count badge
                  html += `<button class="platform-tab mine-tab ${currentPlatform === 'mine' ? 'active' : ''}" data-platform="mine" role="tab" onclick="switchPlatform('mine')">
    ⭐ 我的
  </button>`;

                  // GitHub third
                  const githubCount = (allTopics['github'] || []).length;
                  html += `<button class="platform-tab ${currentPlatform === 'github' ? 'active' : ''}" data-platform="github" role="tab" onclick="switchPlatform('github')">
    GitHub Trending <span class="tab-count">${githubCount}</span>
  </button>`;

                  // Remaining platforms (skip github, already added)
                  for (const [id, name] of Object.entries(PLATFORM_NAMES)) {
                        if (id === 'github') continue;
                        const count = (allTopics[id] || []).length;
                        html += `<button class="platform-tab ${currentPlatform === id ? 'active' : ''}" data-platform="${id}" role="tab" onclick="switchPlatform('${id}')">
      ${name} <span class="tab-count">${count}</span>
    </button>`;
                  }

                  tabs.innerHTML = html;
            }

            function switchPlatform(p) {
                  currentPlatform = p;
                  currentPage = 1;
                  updatePlatformTabs();
                  const chatSection = document.getElementById('myChatSection');
                  if (chatSection) chatSection.style.display = p === 'mine' ? 'flex' : 'none';
                  if (p === 'mine') {
                        renderMyPage();
                  } else {
                        renderTopics();
                  }
            }

            function getVisibleTopics() {
                  if (currentPlatform === 'all') {
                        const merged = [];
                        for (const [platform, topics] of Object.entries(allTopics)) {
                              for (const t of (topics || [])) {
                                    merged.push({ ...t, platform });
                              }
                        }
                        return merged;
                  }
                  return (allTopics[currentPlatform] || []).map(t => ({ ...t, platform: currentPlatform }));
            }

            function renderTopics() {
                  const container = document.getElementById('topicListContainer');
                  const topics = getVisibleTopics();
                  const totalTopics = topics.length;
                  const totalPages = Math.max(1, Math.ceil(totalTopics / PAGE_SIZE));

                  if (currentPage > totalPages) currentPage = 1;

                  document.getElementById('topicCount').textContent = `${totalTopics} topics`;

                  if (totalTopics === 0) {
                        container.innerHTML = `<div class="ai-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>暂无数据，请点击「刷新数据」获取最新热点</p>
    </div>`;
                        return;
                  }

                  // Paginate
                  const startIdx = (currentPage - 1) * PAGE_SIZE;
                  const pageTopics = topics.slice(startIdx, startIdx + PAGE_SIZE);

                  let html = '<div class="topic-list">' + pageTopics.map((t, i) => {
                        const globalIdx = startIdx + i;
                        const rankClass = globalIdx === 0 ? 'top-1' : globalIdx === 1 ? 'top-2' : globalIdx === 2 ? 'top-3' : '';
                        const platformLabel = currentPlatform === 'all' ? `<span class="topic-category">${PLATFORM_NAMES[t.platform] || t.platform}</span>` : '';
                        const category = t.category ? `<span class="topic-category">${t.category}</span>` : '';
                        const isLiked = !!myLikes[t.title];
                        return `<a class="topic-item" ${t.url ? `href="${t.url}" target="_blank" rel="noopener noreferrer"` : ''} aria-label="${escapeAttr(t.title)}">
      <div class="topic-rank ${rankClass}">${globalIdx + 1}</div>
      <div class="topic-content">
        <div class="topic-title">${escapeHtml(t.title)}</div>
        <div class="topic-meta">
          <span class="topic-heat">${t.hot_value || ''}</span>
          ${platformLabel}${category}
        </div>
      </div>
      <div class="topic-actions">
        <button class="topic-action-btn like-btn ${isLiked ? 'liked' : ''}" onclick="event.preventDefault();event.stopPropagation();toggleLike(event,'${escapeAttr(t.title)}','${escapeAttr(t.platform || currentPlatform)}','${escapeAttr(t.url || '')}')" title="${isLiked ? '取消收藏' : '收藏'}" aria-label="${isLiked ? '取消收藏' : '收藏'} ${escapeAttr(t.title)}">
          <svg viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="topic-action-btn" onclick="event.preventDefault();event.stopPropagation();analyzeTopic('${escapeAttr(t.title)}')" title="AI 分析此话题" aria-label="分析 ${escapeAttr(t.title)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4c0 2 1 3 2 4l-5 7h14l-5-7c1-1 2-2 2-4a4 4 0 0 0-4-4z"/><path d="M12 18v4"/></svg>
        </button>
      </div>
    </a>`;
                  }).join('') + '</div>';

                  // Pagination controls
                  if (totalPages > 1) {
                        html += '<div class="pagination">';
                        html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹</button>`;

                        const pages = getPageNumbers(currentPage, totalPages);
                        for (const p of pages) {
                              if (p === '...') {
                                    html += '<span class="page-info">…</span>';
                              } else {
                                    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
                              }
                        }

                        html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>›</button>`;
                        html += `<span class="page-info">${startIdx + 1}-${Math.min(startIdx + PAGE_SIZE, totalTopics)} / ${totalTopics}</span>`;
                        html += '</div>';
                  }

                  container.innerHTML = html;
            }

            function getPageNumbers(current, total) {
                  if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
                  const pages = [];
                  pages.push(1);
                  if (current > 3) pages.push('...');
                  for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) {
                        pages.push(i);
                  }
                  if (current < total - 2) pages.push('...');
                  pages.push(total);
                  return pages;
            }

            function goToPage(page) {
                  const topics = getVisibleTopics();
                  const totalPages = Math.ceil(topics.length / PAGE_SIZE);
                  if (page < 1 || page > totalPages) return;
                  currentPage = page;
                  renderTopics();
                  document.getElementById('topicListContainer').scrollTop = 0;
            }

            function updateChart() {
                  const ctx = document.getElementById('heatChart');
                  const labels = [];
                  const values = [];
                  const colors = [];

                  for (const [id, name] of Object.entries(PLATFORM_NAMES)) {
                        const topics = allTopics[id] || [];
                        labels.push(name);
                        values.push(topics.length);
                        colors.push(PLATFORM_COLORS[id]);
                  }

                  if (heatChart) heatChart.destroy();

                  heatChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                              labels,
                              datasets: [{
                                    label: '热点数量',
                                    data: values,
                                    backgroundColor: colors.map(c => c + '33'),
                                    borderColor: colors,
                                    borderWidth: 1.5,
                                    borderRadius: 6,
                                    barPercentage: 0.6,
                              }]
                        },
                        options: {
                              responsive: true,
                              maintainAspectRatio: false,
                              plugins: {
                                    legend: { display: false },
                                    tooltip: {
                                          backgroundColor: '#16161F',
                                          borderColor: 'rgba(0,255,255,0.2)',
                                          borderWidth: 1,
                                          titleFont: { family: "'Fira Code', monospace", size: 12 },
                                          bodyFont: { family: "'Fira Sans', sans-serif", size: 12 },
                                          titleColor: '#00FFFF',
                                          bodyColor: '#E8E8F0',
                                          padding: 10,
                                          cornerRadius: 8,
                                    }
                              },
                              scales: {
                                    x: {
                                          grid: { color: 'rgba(255,255,255,0.04)' },
                                          ticks: { color: '#8888A0', font: { family: "'Fira Sans', sans-serif", size: 11 } },
                                          border: { color: 'rgba(255,255,255,0.06)' }
                                    },
                                    y: {
                                          grid: { color: 'rgba(255,255,255,0.04)' },
                                          ticks: { color: '#555570', font: { family: "'Fira Code', monospace", size: 11 } },
